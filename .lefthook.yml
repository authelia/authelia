---
pre-commit:
  piped: true
  jobs:
    - name: check tools
      run: ./check-tools.sh

    - name: linters
      group:
        parallel: true
        jobs:
          - name: eslint
            run: pnpm -s lint && echo "0 issues."
            root: "web/"
            glob: "*.{js,jsx,ts,tsx}"
            stage_fixed: true

          - name: goimports-reviser
            run: |
              goimports-reviser -rm-unused -format \
              -company-prefixes authelia.com,github.com/authelia {staged_files} 2>/dev/null \
              && echo "0 issues."
            glob: "*.go"
            stage_fixed: true

          - name: golangci-lint
            run: golangci-lint run --fix
            glob: "*.go"
            stage_fixed: true

          - name: shellcheck
            run: shellcheck --format=gcc {staged_files} && echo "0 issues."
            file_types:
              - text/x-shellscript
              - text/x-sh

          - name: trufflehog
            run: trufflehog --fail --log-level=-1 filesystem -x .trufflehog . && echo "0 issues."

          - name: typos
            run: typos -w --format brief && echo "0 issues."
            stage_fixed: true

          - name: yamllint
            run: yamllint -f parsable . && echo "0 issues."
            glob: "*.{yml,yaml}"

          - name: zizmor
            run: zizmor {staged_files} && echo "0 issues."
            glob: ".github/workflows/*.{yml,yaml}"

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit
      root: "web/"
...
