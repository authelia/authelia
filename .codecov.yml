---
codecov:
  require_ci_to_pass: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default: false
      backend:
        base: auto
        threshold: 0.15%
        flags:
          - backend
      frontend:
        base: auto
        threshold: 0.15%
        flags:
          - frontend

flags:
  backend:
    paths:
      - "cmd/authelia/"
      - "internal/"
      - "!internal/suites/"
  frontend:
    paths:
      - "web/"
      - "!web/coverage/"

ignore:
  - "**/coverage.txt"
  - "web/src/serviceWorker.ts"
  - "cmd/authelia-gen"
  - "cmd/authelia-scripts"
  - "cmd/authelia-suites"
  - "internal/mocks"
  - "internal/**/*_mock_test.go"

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false
...
