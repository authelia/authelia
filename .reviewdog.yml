---
runner:
  eslint:
    cmd: cd web && pnpm eslint --format rdjson --ext '*/**/*.{js,jsx,ts,tsx}' .
    format: rdjson
    level: error

  golangci:
    cmd: golangci-lint run
    errorformat:
      - '%E%f:%l:%c: %m'
      - '%E%f:%l: %m'
      - '%C%.%#'
    level: error

  typos:
    cmd: typos --format brief .
    errorformat:
      - '%f:%l:%c: %m'
    level: error

  shellcheck:
    cmd: .buildkite/steps/lint.sh shellcheck --format=gcc
    errorformat:
      - '%f:%l:%c: %trror: %m'
      - '%f:%l:%c: %tarning: %m'
      - '%f:%l:%c: %tote: %m'
    level: error

  yamllint:
    cmd: yamllint -f parsable .
    errorformat:
      - '%f:%l:%c: %m'
    level: error
...
